<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keyboard Smash!</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  overflow: hidden;
  cursor: none;
  user-select: none;
  -webkit-user-select: none;
}
canvas {
  display: block;
  width: 100vw;
  height: 100vh;
}
#start-screen {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: radial-gradient(ellipse at center, #2a1a4e 0%, #1a1a2e 70%);
  cursor: pointer;
  z-index: 10;
}
#start-screen h1 {
  font-family: 'Segoe UI', system-ui, sans-serif;
  font-size: clamp(3rem, 8vw, 6rem);
  color: #fff;
  text-shadow: 0 0 40px #a855f7, 0 0 80px #6366f1;
  animation: pulse 1.8s ease-in-out infinite;
}
#start-screen p {
  font-family: 'Segoe UI', system-ui, sans-serif;
  font-size: 1.2rem;
  color: #a0a0c0;
  margin-top: 1rem;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.08); opacity: 0.85; }
}
.hidden { display: none !important; }
</style>
</head>
<body>
<div id="start-screen">
  <h1>Click to Play!</h1>
  <p>Press ESC to exit</p>
</div>
<canvas id="game"></canvas>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const startScreen = document.getElementById('start-screen');

  // --- Config ---
  const COLORS = [
    '#f43f5e','#ec4899','#a855f7','#8b5cf6','#6366f1',
    '#3b82f6','#06b6d4','#14b8a6','#22c55e','#84cc16',
    '#eab308','#f97316','#ef4444','#fb923c'
  ];
  const SHAPES = ['circle','star','triangle','square','heart'];
  // Pentatonic scale across two octaves
  const PENTATONIC = [
    261.63,293.66,329.63,392.00,440.00,
    523.25,587.33,659.25,783.99,880.00
  ];
  const EFFECT_LIFETIME = 1500;
  const PARTICLE_LIFETIME = 800;
  const PARTICLES_PER_BURST = 12;
  const MAX_EFFECTS = 50;
  const MAX_PARTICLES = 200;
  const MASTER_GAIN = 0.3;

  const BLOCK_KEYS = new Set([
    'Control','Alt','Shift','Meta','Delete','Insert',
    'Home','End','PageUp','PageDown','Tab','CapsLock',
    'ScrollLock','NumLock','Pause','ContextMenu',
    'F1','F2','F3','F4','F5','F6','F7','F8','F9','F10','F11','F12'
  ]);

  let effects = [];
  let particles = [];
  let audioCtx = null;
  let masterGain = null;
  let running = false;

  // --- Resize ---
  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  // --- Audio ---
  function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = MASTER_GAIN;
    masterGain.connect(audioCtx.destination);
  }

  function playTone() {
    if (!audioCtx) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const freq = PENTATONIC[Math.floor(Math.random() * PENTATONIC.length)];
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = Math.random() < 0.5 ? 'sine' : 'triangle';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.35);
  }

  // --- Helpers ---
  function randColor() { return COLORS[Math.floor(Math.random() * COLORS.length)]; }
  function randShape() { return SHAPES[Math.floor(Math.random() * SHAPES.length)]; }
  function rand(min, max) { return min + Math.random() * (max - min); }

  // --- Shapes ---
  function drawShape(x, y, size, shape, color, alpha) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = color;
    ctx.beginPath();
    switch (shape) {
      case 'circle':
        ctx.arc(x, y, size, 0, Math.PI * 2);
        break;
      case 'square':
        ctx.rect(x - size, y - size, size * 2, size * 2);
        break;
      case 'triangle':
        ctx.moveTo(x, y - size);
        ctx.lineTo(x + size, y + size);
        ctx.lineTo(x - size, y + size);
        ctx.closePath();
        break;
      case 'star': {
        const spikes = 5, outerR = size, innerR = size * 0.45;
        for (let i = 0; i < spikes * 2; i++) {
          const r = i % 2 === 0 ? outerR : innerR;
          const angle = (i * Math.PI / spikes) - Math.PI / 2;
          if (i === 0) ctx.moveTo(x + r * Math.cos(angle), y + r * Math.sin(angle));
          else ctx.lineTo(x + r * Math.cos(angle), y + r * Math.sin(angle));
        }
        ctx.closePath();
        break;
      }
      case 'heart': {
        const s = size * 0.6;
        ctx.moveTo(x, y + s);
        ctx.bezierCurveTo(x - s * 2, y - s, x - s * 0.5, y - s * 2, x, y - s * 0.5);
        ctx.bezierCurveTo(x + s * 0.5, y - s * 2, x + s * 2, y - s, x, y + s);
        break;
      }
    }
    ctx.fill();
    ctx.restore();
  }

  // --- Effects ---
  class KeyEffect {
    constructor(char) {
      this.char = char;
      this.x = rand(100, canvas.width - 100);
      this.y = rand(100, canvas.height - 100);
      this.fontSize = rand(80, 200);
      this.color = randColor();
      this.shapeColor = randColor();
      this.shape = randShape();
      this.born = performance.now();
      this.lifetime = EFFECT_LIFETIME;
    }
    draw(now) {
      const age = now - this.born;
      if (age > this.lifetime) return false;
      const t = age / this.lifetime;
      const alpha = 1 - t;
      // Spring-in scale: overshoot then settle
      let scale;
      if (t < 0.15) {
        scale = (t / 0.15) * 1.3;
      } else if (t < 0.3) {
        scale = 1.3 - ((t - 0.15) / 0.15) * 0.3;
      } else {
        scale = 1.0;
      }
      // Background shape
      drawShape(this.x, this.y, this.fontSize * 0.7 * scale, this.shape, this.shapeColor, alpha * 0.3);
      // Character
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.font = `bold ${this.fontSize * scale}px 'Segoe UI', system-ui, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = this.color;
      ctx.shadowColor = this.color;
      ctx.shadowBlur = 20 * alpha;
      ctx.fillText(this.char, this.x, this.y);
      ctx.restore();
      return true;
    }
  }

  class Particle {
    constructor(x, y) {
      const angle = Math.random() * Math.PI * 2;
      const speed = rand(2, 7);
      this.x = x;
      this.y = y;
      this.vx = Math.cos(angle) * speed;
      this.vy = Math.sin(angle) * speed - 2;
      this.size = rand(3, 8);
      this.color = randColor();
      this.born = performance.now();
      this.lifetime = PARTICLE_LIFETIME;
    }
    draw(now) {
      const age = now - this.born;
      if (age > this.lifetime) return false;
      const t = age / this.lifetime;
      this.x += this.vx;
      this.y += this.vy;
      this.vy += 0.15; // gravity
      ctx.save();
      ctx.globalAlpha = 1 - t;
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size * (1 - t * 0.5), 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      return true;
    }
  }

  // --- Display character mapping ---
  function getDisplayChar(e) {
    if (e.key === ' ') return '~';
    if (e.key === 'Enter') return '*';
    if (e.key === 'Backspace') return '<';
    if (e.key === 'ArrowUp') return '^';
    if (e.key === 'ArrowDown') return 'v';
    if (e.key === 'ArrowLeft') return '<';
    if (e.key === 'ArrowRight') return '>';
    if (e.key.length === 1) return e.key.toUpperCase();
    return null;
  }

  // --- Key handling ---
  function onKeyDown(e) {
    if (!running) return;
    if (e.key === 'Escape') return; // let browser exit fullscreen
    if (BLOCK_KEYS.has(e.key)) { e.preventDefault(); return; }
    e.preventDefault();
    const char = getDisplayChar(e);
    if (!char) return;
    // Spawn effect
    if (effects.length < MAX_EFFECTS) {
      const eff = new KeyEffect(char);
      effects.push(eff);
      // Spawn particles
      for (let i = 0; i < PARTICLES_PER_BURST && particles.length < MAX_PARTICLES; i++) {
        particles.push(new Particle(eff.x, eff.y));
      }
    }
    playTone();
  }

  document.addEventListener('keydown', onKeyDown);
  document.addEventListener('contextmenu', e => e.preventDefault());

  // --- Fullscreen ---
  startScreen.addEventListener('click', () => {
    initAudio();
    document.documentElement.requestFullscreen().catch(() => {
      // If fullscreen fails, start anyway
      startGame();
    });
  });

  document.addEventListener('fullscreenchange', () => {
    if (document.fullscreenElement) {
      startGame();
    } else {
      stopGame();
    }
  });

  function startGame() {
    startScreen.classList.add('hidden');
    running = true;
    effects = [];
    particles = [];
    resize();
    loop();
  }

  function stopGame() {
    running = false;
    startScreen.classList.remove('hidden');
  }

  // --- Animation loop ---
  function loop() {
    if (!running) return;
    const now = performance.now();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    effects = effects.filter(e => e.draw(now));
    particles = particles.filter(p => p.draw(now));
    requestAnimationFrame(loop);
  }
})();
</script>
</body>
</html>
